<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; font-src https://fonts.gstatic.com" />
  <title>CM Timer</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">

    <!-- Top bar (drag handle) -->
    <div id="topbar" class="topbar">
      <div class="topbar-left">
        <button id="back-btn" class="icon-btn hidden no-drag" title="Back">
          <svg viewBox="0 0 16 16" width="14" height="14"><path d="M10 3 L5 8 L10 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span id="status-dot" class="dot dot-gray"></span>
        <span id="topbar-label" class="topbar-label">NO TIMER</span>
      </div>
      <div class="topbar-right no-drag">
        <button id="settings-btn" class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="min-btn" class="icon-btn" title="Minimize">
          <svg viewBox="0 0 16 16" width="14" height="14"><path d="M3 8 H13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
        <button id="close-btn" class="icon-btn" title="Close">
          <svg viewBox="0 0 16 16" width="14" height="14"><path d="M4 4 L12 12 M12 4 L4 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <!-- Body (view container) -->
    <div id="body" class="body">

      <!-- Idle -->
      <div id="view-idle" class="view view-idle">
        <div class="idle-brand">
          <div class="idle-brand-tile">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="8.4" fill="none" stroke-width="2.4" style="stroke:var(--border)"/>
              <circle cx="12" cy="12" r="8.4" fill="none" stroke-width="3" stroke-linecap="round" stroke-dasharray="30 53" transform="rotate(-126 12 12)" style="stroke:var(--accent-red)"/>
              <circle cx="12" cy="12" r="1.9" style="fill:var(--accent-red)"/>
            </svg>
          </div>
          <div class="idle-brand-text">
            <span class="idle-brand-name">CM Timer</span>
            <span class="idle-brand-sub">Ready when you are.</span>
          </div>
        </div>
        <div id="idle-recents-wrap" class="idle-recents-wrap">
          <div id="idle-recents-label" class="section-label hidden">RECENT</div>
          <div id="idle-recents" class="idle-recents"></div>
        </div>
        <button id="start-job-btn" class="btn btn-primary">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Select a job
        </button>
      </div>

      <!-- Running -->
      <div id="view-running" class="view hidden">
        <div class="run-card">
          <div class="job-line">
            <span id="job-number" class="job-number">—</span>
            <span id="job-name" class="job-name">—</span>
          </div>
          <div class="time-row">
            <span id="elapsed" class="elapsed">0:00</span>
          </div>
          <div class="track">
            <div id="track-fill" class="track-fill"></div>
            <div id="track-knob" class="track-knob"></div>
          </div>
          <div class="totals">
            <span id="today">Today 0m</span><span class="totals-sep"> · </span><span id="total">Total 0m</span>
          </div>
        </div>
        <div class="btn-row">
          <button id="stop-btn" class="btn btn-stop">
            <svg viewBox="0 0 16 16" width="11" height="11"><rect x="4" y="4" width="8" height="8" rx="1" fill="currentColor"/></svg>
            Stop
          </button>
          <button id="switch-btn" class="btn btn-switch">
            <svg viewBox="0 0 16 16" width="12" height="12"><path d="M3 5 H12 M10 3 L12 5 L10 7 M13 11 H4 M6 9 L4 11 L6 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Switch
          </button>
        </div>
        <div class="btn-row distract-row">
          <button id="sub5-btn" class="btn btn-distract">−5m</button>
          <button id="sub15-btn" class="btn btn-distract">−15m</button>
          <button id="log-btn" class="btn-log" title="Comment to Monday">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 10V3M5 6 8 3 11 6M3 12h10"/></svg>
            Comment to Monday
          </button>
        </div>
        <span id="distract-flash" class="distract-flash hidden"></span>
      </div>

      <!-- Picker -->
      <div id="view-picker" class="view hidden">
        <div class="filter-row-wrap no-drag">
          <div id="filter-row" class="filter-row"></div>
          <button id="refresh-btn" class="icon-btn refresh-btn" title="Refresh jobs">
            <svg id="refresh-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
          </button>
        </div>
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 16 16" width="13" height="13"><circle cx="7" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M10 10 L13 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          <input id="search" class="search no-drag" type="text" placeholder="Search jobs or paste a job number" />
        </div>
        <div class="picker-list">
          <div class="section-label" id="recent-label">RECENT</div>
          <div id="recent-list"></div>
          <div class="section-label" id="all-label">ALL ASSIGNED</div>
          <div id="all-list"></div>
          <div id="picker-empty" class="picker-empty hidden">No matching jobs</div>
        </div>
      </div>

    </div>

    <!-- Demo-mode footer label (shown only in demo mode) -->
    <div id="demo-footer" class="demo-footer hidden">DEMO MODE</div>

    <div id="view-pill" class="pill hidden">
      <span id="pill-grab" class="pill-grab" title="Drag to move">
        <svg width="8" height="15" viewBox="0 0 8 15" fill="currentColor"><circle cx="2" cy="2.5" r="1.1"/><circle cx="6" cy="2.5" r="1.1"/><circle cx="2" cy="7.5" r="1.1"/><circle cx="6" cy="7.5" r="1.1"/><circle cx="2" cy="12.5" r="1.1"/><circle cx="6" cy="12.5" r="1.1"/></svg>
      </span>
      <div id="pill-info" class="pill-info" title="Click to expand">
        <span id="pill-dot" class="dot dot-gray"></span>
        <span id="pill-number" class="pill-number"></span>
        <span id="pill-time" class="pill-time"></span>
        <span id="pill-today" class="pill-today"></span>
      </div>
      <div id="pill-controls" class="pill-controls">
        <span class="pill-div"></span>
        <button id="pill-sub5" class="pill-mbtn" title="Subtract 5 min">−5</button>
        <button id="pill-sub15" class="pill-mbtn" title="Subtract 15 min">−15</button>
        <button id="pill-comment" class="pill-cbtn" title="Comment to Monday">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        </button>
        <button id="pill-switch" class="pill-ibtn" title="Switch job">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5 H12 M10 3 L12 5 L10 7 M13 11 H4 M6 9 L4 11 L6 13"/></svg>
        </button>
        <button id="pill-stop" class="pill-stop" title="Stop">
          <svg width="13" height="13" viewBox="0 0 16 16"><rect x="4" y="4" width="8" height="8" rx="1.5" fill="currentColor"/></svg>
        </button>
      </div>
      <div id="pill-resume-wrap" class="pill-idle hidden">
        <button id="pill-resume" class="pill-start" title="Resume last job">
          <svg width="12" height="12" viewBox="0 0 16 16"><polygon points="4 2.5 13 8 4 13.5" fill="currentColor"/></svg>
          Resume
        </button>
        <button id="pill-resume-switch" class="pill-ibtn" title="Switch job">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5 H12 M10 3 L12 5 L10 7 M13 11 H4 M6 9 L4 11 L6 13"/></svg>
        </button>
        <button id="pill-expand" class="pill-ibtn" title="Expand">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h4v4 M7 13H3v-4 M13 3l-4 4 M3 13l4-4"/></svg>
        </button>
      </div>
      <div id="pill-idle" class="pill-idle hidden">
        <button id="pill-start" class="pill-start" title="Select a job">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Select a job
        </button>
      </div>
    </div>

    <!-- Bottom-right resize grip (full views only) -->
    <div id="resize-grip" class="resize-grip no-drag" title="Drag to resize">
      <svg viewBox="0 0 12 12" width="12" height="12"><path d="M11 4 L4 11 M11 8 L8 11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden">
      <span id="toast-text"></span>
      <button id="toast-undo" class="toast-undo">Undo</button>
    </div>

    <!-- In-widget alert (safety nets) -->
    <div id="alert" class="alert hidden">
      <div id="alert-msg" class="alert-msg"></div>
      <div id="alert-actions" class="alert-actions"></div>
    </div>

    <!-- Sync indicator -->
    <div id="sync" class="sync hidden"></div>

    <!-- Morning check-in modal -->
    <div id="morning" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-title">Timer left running</div>
        <div id="morning-msg" class="modal-msg"></div>
        <button class="btn btn-primary modal-btn" data-choice="stop-yesterday">Stop it now (recommended)</button>
        <button class="btn btn-switch modal-btn" data-choice="overnight">It was working overnight</button>
        <button class="btn btn-ghost modal-btn" data-choice="discard">Discard the session</button>
      </div>
    </div>

    <!-- First-run welcome -->
    <div id="welcome" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-title">CM Timer</div>
        <div class="modal-msg">Track time locally and log finished sessions to your Monday board.</div>
        <button class="btn btn-primary modal-btn" id="welcome-connect">Connect to Monday</button>
        <button class="btn btn-switch modal-btn" id="welcome-demo">Try demo mode</button>
      </div>
    </div>

    <!-- Log Time confirmation modal -->
    <div id="confirm-export" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-title">Comment to Monday</div>
        <div id="confirm-export-msg" class="modal-msg"></div>
        <textarea id="confirm-export-note" class="search no-drag" rows="2" placeholder="Type your comment"></textarea>
        <button class="btn btn-primary modal-btn" id="confirm-export-yes">Post Comment</button>
        <button class="btn btn-ghost modal-btn" id="confirm-export-no">Cancel</button>
      </div>
    </div>

  </div>

  <!-- Harness is inert under Electron (preload already defined window.timerAPI);
       in a plain browser it installs a mock bridge so the UI can be QA-tested. -->
  <script src="harness.js"></script>
  <script src="app.js"></script>
</body>
</html>
