appId: com.compumail.timerwidget
productName: Compu-Mail Timer
copyright: Compu-Mail LLC
directories:
  output: dist
  buildResources: build
# Ship only what the app needs; harness.js is a browser-only QA shim and is excluded.
files:
  - src/**/*
  - package.json
  - "!src/renderer/harness.js"
win:
  target: nsis
  icon: build/icon.ico
  artifactName: CompuMailTimer-Setup-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
